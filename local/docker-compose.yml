services:

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: electric_curator
      POSTGRES_USER: curator
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curator -d electric_curator"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Alembic Migrations (runs once, then exits) ───────────────────────────────
  migrate:
    build:
      context: ..
      dockerfile: local/Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql+asyncpg://curator:${POSTGRES_PASSWORD:-localpass}@db:5432/electric_curator
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ─── Seed users (runs once after migrations, then exits) ──────────────────────
  seed:
    build:
      context: ..
      dockerfile: local/Dockerfile.seed
    environment:
      DATABASE_URL: postgresql+asyncpg://curator:${POSTGRES_PASSWORD:-localpass}@db:5432/electric_curator
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  # ─── Firestore Emulator ───────────────────────────────────────────────────────
  firebase:
    image: andreysenov/firebase-tools:latest
    command: firebase emulators:start --only firestore --project demo-local
    volumes:
      - ./firebase.json:/home/node/firebase.json:ro
      - firebase_cache:/home/node/.cache/firebase/emulators
    working_dir: /home/node
    ports:
      - "4000:4000"   # Emulator UI
      - "8081:8081"   # Firestore

  # ─── Seed Firestore events (runs once after emulator is up, then exits) ───────
  seed-events:
    build:
      context: ..
      dockerfile: local/Dockerfile.seed-events
    environment:
      FIRESTORE_EMULATOR_HOST: firebase:8081
      GOOGLE_CLOUD_PROJECT: demo-local
    depends_on:
      firebase:
        condition: service_started
    restart: "no"

  # ─── Pub/Sub Emulator ─────────────────────────────────────────────────────────
  # Auto-creates the topics listed in PUBSUB_PROJECT1 on boot.
  pubsub:
    image: messagebird/gcloud-pubsub-emulator:latest
    environment:
      PUBSUB_PROJECT1: demo-local,swipe-events
    ports:
      - "8085:8681"

  # ─── BigQuery emulator (goccy/bigquery-emulator) ─────────────────────────────
  # REST API on host :9050. Datasets/tables seeded from bq_seed.yaml.
  bigquery-emulator:
    image: ghcr.io/goccy/bigquery-emulator:latest
    command:
      - --project=demo-local
      - --data-from-yaml=/data/seed.yaml
      - --port=9050
      - --grpc-port=9060
    volumes:
      - ./bq_seed.yaml:/data/seed.yaml:ro
    ports:
      - "9550:9050"
      - "9560:9060"

  # ─── Pub/Sub → BigQuery sink (local replica of the prod BQ subscription) ─────
  # Pulls swipe-events from the emulator and appends envelope rows to
  # ./swipes_data/swipes_raw.jsonl with the same shape as raw.swipes_raw in BQ.
  pubsub-bq-sink:
    build:
      context: ..
      dockerfile: local/Dockerfile.pubsub-bq-sink
    environment:
      GOOGLE_CLOUD_PROJECT: demo-local
      PUBSUB_EMULATOR_HOST: pubsub:8681
      PUBSUB_TOPIC: swipe-events
      PUBSUB_SUBSCRIPTION: swipe-events-sub
      BIGQUERY_API_ENDPOINT: http://bigquery-emulator:9050
      BIGQUERY_DATASET: raw
      BIGQUERY_TABLE: swipes_raw
      OUTPUT_PATH: /data/swipes_raw.jsonl
    volumes:
      - ./swipes_data:/data
    depends_on:
      pubsub:
        condition: service_started
      bigquery-emulator:
        condition: service_started
    restart: unless-stopped

  # ─── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend/portal-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://curator:${POSTGRES_PASSWORD:-localpass}@db:5432/electric_curator
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-dev-secret-change-before-prod}
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
      ENVIRONMENT: development
      GOOGLE_CLOUD_PROJECT: demo-local
      FIREBASE_AUTH_PROJECT_ID: project3grupo3
      FIRESTORE_EMULATOR_HOST: firebase:8081
      PUBSUB_EMULATOR_HOST: pubsub:8681
      PUBSUB_TOPIC_SWIPE_EVENTS: swipe-events
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      firebase:
        condition: service_started
      pubsub:
        condition: service_started
    restart: unless-stopped

  # ─── Frontend (production build → Nginx) ─────────────────────────────────────
  # Enabled only with `--profile full`. Default stack leaves port 5173 free for
  # Vite dev (`npm run dev` from frontend/portal/).
  frontend:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: local/Dockerfile.frontend
      args:
        BACKEND_URL: ${BACKEND_URL:-http://localhost:8080}
    ports:
      - "5173:80"

volumes:
  postgres_data:
  firebase_cache:
