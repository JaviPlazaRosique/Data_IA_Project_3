server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes served by index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets: long cache, immutable (Vite hashes filenames)
    location ~* \.(?:js|css|woff2?|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html or public-config.json
    location ~* (?:index\.html|public-config\.json)$ {
        expires off;
        add_header Cache-Control "no-store";
    }
}
