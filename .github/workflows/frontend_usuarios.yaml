name: cicd_frontend_usuarios

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/portal/**'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/portal/**'

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    name: Integracion
    runs-on: ubuntu-latest

    steps:
      - name: Cargar repo
        uses: actions/checkout@v4

      - name: Cargar node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/portal/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: frontend/portal

      - name: Build
        run: npm run build
        working-directory: frontend/portal

  cd:
    if: github.ref == 'refs/heads/main'
    name: Despliegue
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Cargar repo
        uses: actions/checkout@v4

      - name: Autenticacion GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.FRONTEND_USUARIOS_CUENTA_SERVICIO }}

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build imagen Docker
        env:
          IMAGE: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/repo-data-ia-project3/portal
          TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:latest" \
            frontend/portal

      - name: Push imagen Docker
        env:
          IMAGE: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/repo-data-ia-project3/portal
        run: docker push --all-tags "$IMAGE"

      - name: Desplegar en Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: portal
          image: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/repo-data-ia-project3/portal:${{ github.sha }}
          region: europe-west1
          flags: --allow-unauthenticated
