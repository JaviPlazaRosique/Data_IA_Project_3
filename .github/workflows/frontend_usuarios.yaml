name: cicd_frontend_usuarios

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/portal/**'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/portal/**'

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    name: Integracion
    runs-on: ubuntu-latest

    steps:
      - name: Cargar repo
        uses: actions/checkout@v4

      - name: Cargar node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/portal/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: frontend/portal

      - name: Test
        run: npm run test
        working-directory: frontend/portal

      - name: Build
        run: npm run build
        working-directory: frontend/portal
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_MAPS_MAP_ID: ${{ secrets.VITE_GOOGLE_MAPS_MAP_ID }}

      - name: Guardar dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/portal/dist/
          retention-days: 1

  cd:
    if: github.ref == 'refs/heads/main'
    name: Despliegue
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Autenticacion GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.FRONTEND_USUARIOS_CUENTA_SERVICIO }}

      - name: Inicio Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Descargar dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Desplegar frontend
        run: gsutil -m rsync -r -d -j js,css,html,json,svg -x "public-config\.json" dist/ gs://${{ secrets.BUCKET_FRONTEND_USUARIOS }}/

      - name: Actualizar public-config.json (Firebase)
        env:
          BUCKET: ${{ secrets.BUCKET_FRONTEND_USUARIOS }}
          FB_API_KEY: ${{ vars.FIREBASE_API_KEY }}
          FB_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: |
          gsutil cp "gs://$BUCKET/public-config.json" public-config.json || echo '{}' > public-config.json
          jq \
            --arg apiKey "$FB_API_KEY" \
            --arg authDomain "$FB_AUTH_DOMAIN" \
            --arg projectId "$FB_PROJECT_ID" \
            '.firebase = {apiKey: $apiKey, authDomain: $authDomain, projectId: $projectId}' \
            public-config.json > tmp.json && mv tmp.json public-config.json
          gsutil -h "Cache-Control:no-cache" cp public-config.json "gs://$BUCKET/public-config.json"
