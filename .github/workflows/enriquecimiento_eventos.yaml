name: cicd_enriquecimiento_eventos

on:
  push:
    branches:
      - main
    paths:
      - 'ingestion/enriquecimiento/**'
  pull_request:
    branches:
      - main
    paths:
      - 'ingestion/enriquecimiento/**'

permissions:
  id-token: write
  contents: read

env:
  REGION: europe-west1
  REPO: repo-recomendador-eventos
  JOB: enriquecimiento-eventos

jobs:
  ci:
    name: Test build imagen
    runs-on: ubuntu-latest

    steps:
      - name: Cargar repo
        uses: actions/checkout@v4

      - name: Test build imagen
        run: docker build --check ingestion/enriquecimiento/

  cd:
    if: github.ref == 'refs/heads/main'
    name: Build, push y despliegue
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Cargar repo
        uses: actions/checkout@v4

      - name: Autenticacion GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.ENRIQUECIMIENTO_EVENTOS_CUENTA_SERVICIO }}

      - name: Configurar Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build y push imagen
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.JOB }}"
          docker build -t "${IMAGE}:latest" ingestion/enriquecimiento/
          docker push "${IMAGE}:latest"

      - name: Actualizar Cloud Run Job
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.JOB }}"
          gcloud run jobs update ${{ env.JOB }} \
            --image="${IMAGE}:latest" \
            --region=${{ env.REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }}
