name: cicd_backend_portal_api

on:
  push:
    branches:
      - main
    paths:
      - 'backend/portal-api/**'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/portal-api/**'

permissions:
  id-token: write
  contents: read

env:
  REGION: europe-west1
  SERVICE: portal-api
  REPO: repo-recomendador-eventos

jobs:
  ci:
    name: Build y push
    runs-on: ubuntu-latest

    steps:
      - name: Cargar repo
        uses: actions/checkout@v4

      - name: Autenticacion GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.BACKEND_PORTAL_API_CUENTA_SERVICIO }}

      - name: Configurar Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build y push imagen
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}"
          docker build -t "${IMAGE}:latest" backend/${{ env.SERVICE }}/
          docker push "${IMAGE}:latest"

  cd:
    if: github.ref == 'refs/heads/main'
    name: Despliegue
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Autenticacion GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.BACKEND_PORTAL_API_CUENTA_SERVICIO }}

      - name: Configurar Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Desplegar en Cloud Run
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}"
          gcloud run services update ${{ env.SERVICE }} \
            --image="${IMAGE}:latest" \
            --region=${{ env.REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }}
