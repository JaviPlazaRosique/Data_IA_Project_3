version: 2

models:
  - name: fct_swipes
    description: "Tabla de hechos de swipes enriquecida con metadatos del evento."
    columns:
      - name: message_id
        tests: [not_null, unique]
      - name: event_id
        tests: [not_null]
      - name: user_id
        tests: [not_null]
      - name: direction
        tests:
          - not_null
          - accepted_values:
              values: ['left', 'right']
      - name: swiped_at
        tests: [not_null]
